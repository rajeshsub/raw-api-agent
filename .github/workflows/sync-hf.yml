name: Sync to HF Space

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to HF Space
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"

          # Build README with HF frontmatter
          cat << 'FRONTMATTER' > /tmp/hf-readme.md
          ---
          title: Raw API Agent
          emoji: 🤖
          colorFrom: indigo
          colorTo: purple
          sdk: docker
          app_port: 7860
          pinned: false
          ---

          FRONTMATTER
          cat README.md >> /tmp/hf-readme.md

          # Orphan branch — single commit, no history, no large files
          git checkout --orphan hf-deploy
          git rm -rf --cached .
          git add app/ requirements.txt Dockerfile .dockerignore
          cp /tmp/hf-readme.md README.md
          git add README.md
          git commit -m "Deploy to HF Space"

          git remote add space https://rajeshsub:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/rajeshsub/raw-api-agent
          git push space hf-deploy:main --force
